<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Quiz Form</title>
  <link rel="stylesheet" href="styles/quiz.css" />
</head>
<body>
  <main class="quiz-wrapper">
    <h1>✅ Basic HTML and CSS Quiz</h1>
    <form class="quiz-form" action="#" method="post">
      <div class="quiz-item">
        <label for="q1"><strong>1.</strong> What does the acronym CSS stand for?</label>
        <input type="text" name="q1" id="q1" />
      </div>
      <div class="quiz-item">
        <label for="q2"><strong>2.</strong> How are ids and class attributes selected in CSS?</label>
        <textarea name="q2" id="q2" rows="4"></textarea>
      </div>
      <div class="quiz-item">
        <label for="q3"><strong>3.</strong> Which of the following is a valid CSS comment?</label>
        <select name="q3" id="q3">
          <option value="" selected disabled>Choose One ...</option>
          <option value="a">// this is the correctcomment</option>
          <option value="b">/* this is the correct comment */</option>
          <option value="c">&lt;!-- this is the correct comment --&gt;</option>
        </select>
      </div>
      <div class="quiz-item">
        <label for="q4"><strong>4.</strong> What is the bottom margin given this declaration?</label>
        <pre class="code-snippet"><code>margin: 10px 5px 15px;</code></pre>
        <input type="number" name="q4" id="q4" />
      </div>
      <button type="submit" class="submit-btn">Submit My Quiz</button>
    </form>
  </main>
</body>
</html>
